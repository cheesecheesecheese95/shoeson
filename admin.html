<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>슈블3 가이드 — 대시보드</title>
<style>
:root{--bg:#f2f2f7;--card:#fff;--accent:#007AFF;--gray1:#1c1c1e;--gray2:#3a3a3c;--gray3:#8e8e93;--gray4:#c7c7cc;--gray5:#e5e5ea;--green:#34C759;--red:#FF3B30;--orange:#FF9500}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--gray1);line-height:1.6}
.app{max-width:800px;margin:0 auto;padding:1.5rem 1rem}
h1{font-size:20px;font-weight:700;margin-bottom:.25rem}
.sub{font-size:12px;color:var(--gray3);margin-bottom:1.5rem}
.card{background:var(--card);border-radius:16px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.card h2{font-size:14px;font-weight:700;color:var(--gray2);margin-bottom:.75rem}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
@media(max-width:500px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--bg);border-radius:12px;padding:12px;text-align:center}
.stat-val{font-size:24px;font-weight:700;color:var(--accent)}
.stat-label{font-size:11px;color:var(--gray3);margin-top:2px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:12px;color:var(--gray2);width:100px;flex-shrink:0}
.bar-track{flex:1;height:8px;background:var(--gray5);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:var(--accent);transition:width .3s}
.bar-val{font-size:12px;font-weight:600;color:var(--gray1);width:40px;text-align:right}
.day-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--gray5);font-size:13px}
.day-row:last-child{border-bottom:none}
.day-date{width:90px;color:var(--gray3);flex-shrink:0}
.day-pv{font-weight:600;color:var(--accent);width:60px}
.day-bar{flex:1;height:6px;background:var(--gray5);border-radius:3px;overflow:hidden}
.day-bar-fill{height:100%;background:var(--accent);border-radius:3px}
.vote-item{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--gray5);font-size:12px;align-items:center}
.vote-item:last-child{border-bottom:none}
.vote-emoji{font-size:16px}
.vote-text{flex:1;color:var(--gray2)}
.vote-date{color:var(--gray4);font-size:11px}
.refresh{padding:8px 16px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:1rem}
.loading{color:var(--gray4);font-size:12px;padding:1rem;text-align:center}
</style>
</head>
<body>
<div class="app">
<h1>슈블3 가이드 대시보드</h1>
<div class="sub">jine.run 운영 현황</div>
<button class="refresh" onclick="loadAll()">새로고침</button>

<div class="card">
  <h2>오늘 요약</h2>
  <div class="stat-grid">
    <div class="stat"><div class="stat-val" id="d-pv">—</div><div class="stat-label">페이지뷰</div></div>
    <div class="stat"><div class="stat-val" id="d-tabs">—</div><div class="stat-label">탭 클릭</div></div>
    <div class="stat"><div class="stat-val" id="d-fit">—</div><div class="stat-label">적합성 진단</div></div>
    <div class="stat"><div class="stat-val" id="d-votes">—</div><div class="stat-label">투표</div></div>
  </div>
</div>

<div class="card">
  <h2>탭별 클릭 (오늘)</h2>
  <div id="d-tab-bars"><div class="loading">불러오는 중…</div></div>
</div>

<div class="card">
  <h2>일별 페이지뷰 (30일)</h2>
  <div id="d-daily"><div class="loading">불러오는 중…</div></div>
</div>

<div class="card">
  <h2>적합성 진단 결과 분포</h2>
  <div id="d-fit-bars"><div class="loading">불러오는 중…</div></div>
</div>

<div class="card">
  <h2>투표 현황</h2>
  <div class="stat-grid" style="margin-bottom:.75rem;">
    <div class="stat"><div class="stat-val" id="d-v-satisfied" style="color:var(--green)">—</div><div class="stat-label">만족</div></div>
    <div class="stat"><div class="stat-val" id="d-v-regret" style="color:var(--red)">—</div><div class="stat-label">후회</div></div>
    <div class="stat"><div class="stat-val" id="d-v-unsure" style="color:var(--gray3)">—</div><div class="stat-label">모르겠다</div></div>
    <div class="stat"><div class="stat-val" id="d-v-consider" style="color:var(--orange)">—</div><div class="stat-label">고민 중</div></div>
  </div>
</div>

<div class="card">
  <h2>최근 한줄평</h2>
  <div id="d-reviews"><div class="loading">불러오는 중…</div></div>
</div>

<div class="card">
  <h2>망설이는 이유 순위</h2>
  <div id="d-hesitation"><div class="loading">불러오는 중…</div></div>
</div>

</div>
<script>
var TRACK_API='https://www.dmcparkviewxion.com/api/realestate-hub?section=shoeson-track';
var VOTE_API='https://www.dmcparkviewxion.com/api/realestate-hub?section=shoeson-vote';

function loadAll(){
  loadTrack();
  loadVotes();
}

function loadTrack(){
  fetch(TRACK_API).then(function(r){return r.json();}).then(function(data){
    var today=new Date().toISOString().slice(0,10);
    var todayData=data[today]||{};

    // 오늘 요약
    document.getElementById('d-pv').textContent=todayData.pageview||0;
    var tabClicks=0;
    Object.keys(todayData).forEach(function(k){if(k.startsWith('tab_')) tabClicks+=todayData[k];});
    document.getElementById('d-tabs').textContent=tabClicks;
    var fitTotal=(todayData.fit_buy||0)+(todayData.fit_maybe||0)+(todayData.fit_skip||0);
    document.getElementById('d-fit').textContent=fitTotal;

    // 탭별 클릭
    var tabLabels={tab_verdict:'살까말까',tab_info:'정보',tab_compare:'비교',tab_reviews:'후기',tab_qa:'FAQ',tab_choice:'선택'};
    var tabEl=document.getElementById('d-tab-bars');
    var maxTab=0;
    Object.values(tabLabels).forEach(function(l){var k=Object.keys(tabLabels).find(function(x){return tabLabels[x]===l;});if(todayData[k]>maxTab) maxTab=todayData[k];});
    tabEl.innerHTML=Object.keys(tabLabels).map(function(k){
      var v=todayData[k]||0;var pct=maxTab?Math.round(v/maxTab*100):0;
      return '<div class="bar-row"><span class="bar-label">'+tabLabels[k]+'</span><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div><span class="bar-val">'+v+'</span></div>';
    }).join('');

    // 일별 페이지뷰
    var days=Object.keys(data).sort().reverse();
    var maxPV=0;
    days.forEach(function(d){if((data[d].pageview||0)>maxPV) maxPV=data[d].pageview;});
    var dailyEl=document.getElementById('d-daily');
    dailyEl.innerHTML=days.map(function(d){
      var pv=data[d].pageview||0;var pct=maxPV?Math.round(pv/maxPV*100):0;
      return '<div class="day-row"><span class="day-date">'+d+'</span><span class="day-pv">'+pv+'</span><div class="day-bar"><div class="day-bar-fill" style="width:'+pct+'%"></div></div></div>';
    }).join('')||'<div class="loading">데이터 없음</div>';

    // 적합성 진단 (전체 기간 합산)
    var fitAll={buy:0,maybe:0,skip:0};
    Object.values(data).forEach(function(d){fitAll.buy+=(d.fit_buy||0);fitAll.maybe+=(d.fit_maybe||0);fitAll.skip+=(d.fit_skip||0);});
    var fitTotal2=fitAll.buy+fitAll.maybe+fitAll.skip;
    var fitEl=document.getElementById('d-fit-bars');
    var fitItems=[{k:'buy',label:'추천',color:'var(--green)'},{k:'maybe',label:'조건부',color:'var(--orange)'},{k:'skip',label:'비추천',color:'var(--red)'}];
    fitEl.innerHTML=fitItems.map(function(f){
      var pct=fitTotal2?Math.round(fitAll[f.k]/fitTotal2*100):0;
      return '<div class="bar-row"><span class="bar-label">'+f.label+'</span><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+f.color+'"></div></div><span class="bar-val">'+fitAll[f.k]+' ('+pct+'%)</span></div>';
    }).join('');
    document.getElementById('d-fit').textContent=fitTotal2;
  }).catch(function(){});
}

function loadVotes(){
  fetch(VOTE_API).then(function(r){return r.json();}).then(function(rows){
    var votes={satisfied:0,regret:0,unsure:0};
    var reviews=[];
    var hCounts={};
    var considerTotal=0;
    rows.forEach(function(row){
      try{
        var d=JSON.parse(row.body);
        if(d.role==='buyer'){
          if(d.vote) votes[d.vote]=(votes[d.vote]||0)+1;
          if(d.review) reviews.push({vote:d.vote,text:d.review,ts:d.ts});
        } else if(d.role==='considering'){
          considerTotal++;
          (d.hesitations||[]).forEach(function(h){hCounts[h]=(hCounts[h]||0)+1;});
        }
      }catch(e){}
    });

    document.getElementById('d-v-satisfied').textContent=votes.satisfied;
    document.getElementById('d-v-regret').textContent=votes.regret;
    document.getElementById('d-v-unsure').textContent=votes.unsure;
    document.getElementById('d-v-consider').textContent=considerTotal;
    document.getElementById('d-votes').textContent=votes.satisfied+votes.regret+votes.unsure+considerTotal;

    // 한줄평
    var emojiMap={satisfied:'😊',regret:'😞',unsure:'🤷'};
    var revEl=document.getElementById('d-reviews');
    revEl.innerHTML=reviews.length?reviews.map(function(r){
      return '<div class="vote-item"><span class="vote-emoji">'+(emojiMap[r.vote]||'💬')+'</span><span class="vote-text">'+r.text+'</span></div>';
    }).join(''):'<div class="loading">한줄평 없음</div>';

    // 망설이는 이유
    var labels={price:'가격 부담',soft:'물컹할까 봐',fit:'발볼 핏',design:'디자인',v2enough:'슈블2 충분',other:'다른 러닝화',first:'첫 러닝화',weight:'체중',soldout:'품절',etc:'기타'};
    var hesEl=document.getElementById('d-hesitation');
    var sorted=Object.entries(hCounts).sort(function(a,b){return b[1]-a[1];});
    var maxH=sorted.length?sorted[0][1]:0;
    hesEl.innerHTML=sorted.length?sorted.map(function(pair){
      var pct=maxH?Math.round(pair[1]/maxH*100):0;
      return '<div class="bar-row"><span class="bar-label">'+(labels[pair[0]]||pair[0])+'</span><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:var(--orange)"></div></div><span class="bar-val">'+pair[1]+'</span></div>';
    }).join(''):'<div class="loading">데이터 없음</div>';
  }).catch(function(){});
}

loadAll();
</script>
</body>
</html>
